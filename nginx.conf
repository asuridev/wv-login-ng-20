worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /tmp/nginx.pid;

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # Load modular configuration files from the /etc/nginx/conf.d directory.
    # See http://nginx.org/en/docs/ngx_core_module.html#include
    # for more information.
    include /opt/app-root/etc/nginx.d/*.conf;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream local {
        server localhost:8080;
    }

    server {
        listen          8080 default_server;
        sub_filter random_nonce_value $request_id;
        sub_filter_once off;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options nosniff;
        add_header Cross-Origin-Resource-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Permissions-Policy "geolocation=(), interest-cohort=()";
        server_tokens off;
        # try_files $uri $uri/ /index.html;
        listen          [::]:8080 default_server;
        server_name     _;
        root            /opt/app-root/src;
        index index.html;

        # Load configuration files for the default server block.
        include /opt/app-root/etc/nginx.default.d/*.conf;

        location = /404.html {
        }

        location /api/live/ws {
            access_log off;
            return 200 '{"status":"UP"}';
            add_header Content-Type application/json;
        }

        location /health {
            access_log off;
            return 200 '{"status":"UP"}';
            add_header Content-Type application/json;
        }

        location /assets/env/env.js
        {
            # Fetching the "env.js" file created in "/tmp" directory after substitution
            root /tmp;
            try_files /env.js =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
